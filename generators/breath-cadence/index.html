<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="__TITLE_EN__ — visual box breathing between tasks" />
    <title>__TITLE_EN__ · Day __DAY_NUM__</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Cutive+Mono&family=Noto+Sans+KR:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-phase="idle" data-running="false">
    <div class="depth-field" aria-hidden="true"></div>
    <div class="caustics" aria-hidden="true"></div>

    <header class="mast reveal">
      <div>
        <p class="eyebrow" data-i18n="brandTag">daily vision lab</p>
        <h1>__TITLE_EN__</h1>
        <p class="ko">__TITLE_KO__</p>
        <p class="lede" data-i18n="lede">tagline</p>
      </div>
      <div class="mast-tools">
        <div id="lang-toggle" class="lang-toggle"></div>
        <p class="stamp" data-i18n="privacyShort">local only</p>
      </div>
    </header>

    <main class="stage">
      <section class="orb-stage reveal" style="--d: 0.08s">
        <div class="ripple-stack" aria-hidden="true">
          <span class="ripple r1"></span>
          <span class="ripple r2"></span>
          <span class="ripple r3"></span>
          <span class="ripple r4"></span>
        </div>
        <div class="orb-core">
          <p id="countdown" class="countdown">4</p>
          <p id="phase-label" class="phase-label">—</p>
        </div>
        <button id="toggle" type="button" class="cadence-btn" data-i18n="btnStart">Begin</button>
      </section>

      <aside class="side reveal" style="--d: 0.16s">
        <div class="panel patterns">
          <h2 data-i18n="guideTitle">Rhythm guide</h2>
          <div class="pattern-row">
            <button type="button" class="pattern-chip active" data-pattern="box" data-i18n="patternBox">Box</button>
            <button type="button" class="pattern-chip" data-pattern="calm" data-i18n="patternCalm">Calm</button>
          </div>
          <p id="guide-text" class="guide-text" data-i18n="guideBox">guide</p>
        </div>

        <div class="panel stats">
          <h2 data-i18n="statsTitle">Today</h2>
          <div class="stat-pair">
            <article>
              <span data-i18n="statCycles">Cycles</span>
              <strong id="stat-cycles">0</strong>
            </article>
            <article>
              <span data-i18n="statMinutes">Breathing</span>
              <strong id="stat-minutes">0m</strong>
            </article>
          </div>
        </div>
      </aside>
    </main>

    <footer class="reveal" style="--d: 0.24s" data-i18n="privacyNote">privacy</footer>
    <p id="toast" class="toast hidden" role="status"></p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
