name: Deploy latest day demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve latest day folder
        id: day
        run: |
          DAY_DIR=$(node scripts/resolve-latest-day.mjs --print-path)
          echo "dir=$DAY_DIR" >> "$GITHUB_OUTPUT"
          echo "Deploying: $DAY_DIR"

      - name: Build latest day
        working-directory: ${{ steps.day.outputs.dir }}
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.day.outputs.dir }}/dist

      - id: deployment
        uses: actions/deploy-pages@v4
