name: Daily new vision app

on:
  schedule:
    # 00:00 Korea Standard Time (UTC+9)
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate next day app
        run: node scripts/generate-next-day.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --staged --quiet && git diff --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git add -A
          git commit -F .git/COMMIT_MSG_DAILY
          git push
